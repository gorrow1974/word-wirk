<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CLES Step2 Prep</title>
<link rel="stylesheet" href="./css/style.css">
<style>
.step-grid{display:grid;grid-template-columns:280px 1fr;gap:18px}.panel{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:18px}.menu-btn{display:block;width:100%;margin:8px 0;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;text-align:left;font-weight:800}.choice{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.choice button{padding:18px;border-radius:18px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-weight:900}.choice button.good{background:#16a34a}.choice button.mid{background:#2563eb}.choice button.bad{background:#dc2626}.reasons{display:none;margin-top:18px}.reasons.active{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.reasons button{padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff}@media(max-width:780px){.step-grid{grid-template-columns:1fr}.choice,.reasons.active{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hero">
  <div class="topbar">
    <button id="homeBtn" class="home-btn" type="button">Home</button>
    <a class="nav-pill" href="./index.html">Timeline</a>
  </div>
  <div class="badge">Step2 Preparation</div>
  <h1>イメージ化トレーニング</h1>
  <p>場面が出たか、なんとなくか、出ないかを即時記録する準備画面。</p>
</header>
<main class="step-grid">
  <aside class="panel">
    <h2>Step</h2>
    <button class="menu-btn">Step2: 場面イメージ</button>
    <button class="menu-btn">Step2-A: 例文</button>
    <button class="menu-btn">Step2-B: 文脈</button>
    <button class="menu-btn">Step2-C: 自分の一文</button>
  </aside>
  <section class="panel">
    <div class="badge small">Header Banner</div>
    <h2 id="targetText">district：地区；行政区</h2>
    <p>この単語・例文から、頭の中に場面が出るかを押してください。</p>
    <div class="choice">
      <button class="good" data-result="image_ok">イメージできた</button>
      <button class="mid" data-result="kind_of">なんとなく</button>
      <button class="bad" id="noImageBtn" data-result="no_image">出ない</button>
    </div>
    <div id="reasons" class="reasons">
      <button>イマイチな理由を教える</button>
      <button>やり直し</button>
      <button>分からなかった</button>
      <button>難しかった</button>
      <button>忘れてた</button>
    </div>
    <pre id="logBox" style="margin-top:18px;white-space:pre-wrap;background:#0b1220;border-radius:14px;padding:14px;"></pre>
  </section>
</main>
<script src="./js/app.js"></script>
<script src="./js/step2.js"></script>
</body>
</html>
